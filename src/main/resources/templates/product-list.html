<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Product List</title>
  <link rel="stylesheet" th:href="@{/style.css}">
</head>
<body>
<div class="container">
  <h1>Product List</h1>

  <div th:if="${message != null}" class="success-message">
    <span th:text="${message}"></span>
  </div>

  <div class="button-group">
    <a th:href="@{/products/new}" class="btn-primary">Add New Product</a>
    <a th:href="@{/}" class="btn">Back to Home</a>
  </div>

  <!-- Проверка на пустоту списка -->
  <div th:if="${#lists.isEmpty(products)}">
    <p>No products found.</p>
  </div>

  <div th:unless="${#lists.isEmpty(products)}">
    <table>
      <thead>
      <tr>
        <th>ID</th>
        <th>Product Code</th>
        <th>Description</th>
        <th>Category</th>
        <th>Part Numbers</th>
        <th>Lists</th>
        <th>Actions</th>
      </tr>
      </thead>
      <tbody>
      <tr th:each="product : ${products}">
        <td th:text="${product.id}"></td>
        <td th:text="${product.productCode}"></td>
        <td th:text="${product.description}"></td>
        <td th:text="${product.category}"></td>
        <td>
          <!-- Безопасная обработка списка -->
          <span th:if="${not #lists.isEmpty(product.parts)}">
                            <span th:each="part, iterStat : ${product.parts}">
                                <span th:text="${part.partNumber}"></span>
                                <span th:if="${not iterStat.last}">, </span>
                            </span>
                        </span>
          <span th:unless="${not #lists.isEmpty(product.parts)}">
                            No parts
                        </span>
        </td>
        <td>
          <!-- Безопасная обработка списка списков -->
          <span th:if="${not #lists.isEmpty(product.lists)}">
                            <span th:each="list, iterStat : ${product.lists}">
                                <span th:text="${list}"></span>
                                <span th:if="${not iterStat.last}">, </span>
                            </span>
                        </span>
        </td>
        <td>
          <a th:href="@{/products/edit/{id}(id=${product.id})}"
             class="btn-secondary">Edit</a>
          <a th:href="@{/products/delete/{id}(id=${product.id})}"
             class="delete-btn"
             onclick="return confirm('Are you sure you want to delete this product?')">Delete</a>
        </td>
      </tr>
      </tbody>
    </table>
  </div>
</div>
</body>
</html>
